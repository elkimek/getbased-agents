name: Tests

# Currently manual-dispatch only — the integration test pulls
# getbased-rag from GitHub, and that repo is private today. Once rag is
# public (or a SIBLING_REPO_PAT secret is configured for the stack repo),
# flip the triggers back to `push` + `pull_request`.
on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    # The integration test downloads the embedder model on first run, which
    # takes the bulk of the runtime. Cached on subsequent runs via the
    # HuggingFace cache dir.
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-MiniLM-L6-v2

      - name: Install stack with test + full extras
        run: uv sync --extra test --extra full

      - name: Run integration tests
        run: uv run pytest -v
        timeout-minutes: 10
