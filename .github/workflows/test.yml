name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast unit tests for mcp + rag — no real embedder, no subprocesses.
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        package: [mcp, rag]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install + run ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: |
          uv sync --extra test
          uv run pytest

  # End-to-end integration — real lens subprocess + real MCP tool calls.
  # Runs only on 3.12 because it's slower (MiniLM first-run download).
  integration:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-MiniLM-L6-v2
      - name: Install stack with full extras
        working-directory: packages/stack
        run: uv sync --extra test --extra full
      - name: Run integration tests
        working-directory: packages/stack
        run: uv run pytest -v
        timeout-minutes: 10
