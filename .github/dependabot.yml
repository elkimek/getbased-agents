version: 2
updates:
  # Each workspace package has its own pyproject.toml — Dependabot
  # tracks them independently so a bump in one package doesn't churn
  # the others. Workspace root has no runtime deps (uv coordinator only).
  - package-ecosystem: pip
    directory: /packages/mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /packages/rag
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /packages/dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /packages/stack
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
