# Monorepo root — not a package itself, just a uv workspace coordinator.
# Each package under packages/ is an independently releasable PyPI project
# with its own pyproject.toml. Run `uv sync` at the root to install every
# package in editable mode + their dev deps.
#
# Published packages:
#   packages/mcp        → getbased-mcp (PyPI)
#   packages/rag        → getbased-rag (PyPI)
#   packages/dashboard  → getbased-dashboard (PyPI; web UI for mcp + rag)
#   packages/stack      → getbased-agent-stack (PyPI; meta that pins the others)

[tool.uv.workspace]
members = ["packages/mcp", "packages/rag", "packages/dashboard", "packages/stack"]

# Cross-package dep resolution: in the workspace, sibling package names
# resolve to the local path instead of PyPI. Lets pytest and editable
# installs pick up in-flight changes without republishing.
[tool.uv.sources]
getbased-mcp = { workspace = true }
getbased-rag = { workspace = true }
getbased-dashboard = { workspace = true }
