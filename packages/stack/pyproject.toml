[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "getbased-agent-stack"
version = "0.1.0"
description = "One-command install of the full getbased agent stack — getbased-mcp + getbased-rag"
readme = "README.md"
license = "GPL-3.0-only"
requires-python = ">=3.10"
# Pulls both sibling packages. Pin to the same release family so the
# protocol versions stay in sync; bump this meta when you cut a new
# coordinated release. Not on PyPI yet — sourced from git tags via
# [tool.uv.sources] below.
dependencies = [
    "getbased-mcp>=0.2.0",
    "getbased-rag>=0.1.0",
]

[project.optional-dependencies]
# With the full parser + ONNX stack on the rag side.
full = ["getbased-rag[full]>=0.1.0"]
# For contributors running the integration test harness.
test = ["pytest>=8.0", "httpx>=0.27", "pytest-timeout>=2.3"]

# uv-specific: resolve sibling packages directly from GitHub until they
# land on PyPI. `tool.uv.sources` is ignored by pip and by PEP 621-only
# tools; it only affects `uv sync` / `uv pip install` / `uv run`. A
# `pipx install getbased-agent-stack` from PyPI (once published) will
# use the normal `dependencies` block.
[tool.uv.sources]
getbased-mcp = { git = "https://github.com/elkimek/getbased-mcp", rev = "main" }
getbased-rag = { git = "https://github.com/elkimek/getbased-rag", rev = "main" }

[project.scripts]
# Convenience launcher. Delegates to the real lens CLI so users don't
# have to remember which package provides which binary.
getbased-stack = "getbased_agent_stack.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
