[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "getbased-rag"
version = "0.7.2"
description = "getbased-rag — standalone RAG knowledge server (formerly the Electron-bundled Lens)"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "qdrant-client>=1.9",
    "sentence-transformers>=2.6",
    "typer>=0.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "python-multipart>=0.0.6",
]

[project.optional-dependencies]
pdf = ["pypdf>=3.9"]
docx = ["python-docx>=1.0"]
# ONNX acceleration. `full` now includes it by default — the install
# is small (~200 MB vs the old ~2 GB) because we load pre-exported
# ONNX weights from HuggingFace directly, skipping optimum and the
# PyTorch→ONNX conversion step. Three pure-Python/native deps:
#   - onnxruntime  (inference, ~100 MB CPU build)
#   - huggingface-hub  (model download, ~2 MB)
#   - tokenizers  (Rust-backed fast tokenizer, ~5 MB)
# Install without ONNX (fall back to sentence-transformers / PyTorch
# CPU): `pip install getbased-rag`. The sentence-transformers dep
# already in core gets you the default LocalEmbedder path — ~2-3x
# slower than ONNX but zero extra config.
full = [
    "pypdf>=3.9",
    "python-docx>=1.0",
    "onnxruntime>=1.17",
    "huggingface-hub>=0.20",
    "tokenizers>=0.15",
]
test = ["pytest>=8.0", "httpx>=0.27"]

[project.scripts]
lens = "lens.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
