[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "getbased-rag"
version = "0.6.2"
description = "getbased-rag — standalone RAG knowledge server (formerly the Electron-bundled Lens)"
readme = "README.md"
license = "GPL-3.0-only"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "qdrant-client>=1.9",
    "sentence-transformers>=2.6",
    "typer>=0.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "python-multipart>=0.0.6",
]

[project.optional-dependencies]
pdf = ["pypdf>=3.9"]
docx = ["python-docx>=1.0"]
# ONNX Runtime acceleration. OPT-IN — not included in [full] because the
# optimum/transformers/onnxruntime version matrix is fragile on a fresh
# install (optimum 2.x removed ORTModelForFeatureExtraction; transformers
# 5.x broke optimum 1.x's loader chain; onnxruntime-gpu installs on CPU-only
# boxes). Pinning tight windows keeps fresh installs working.
#
# Users who want GPU or low-latency CPU: `pip install "getbased-rag[full,onnx]"`.
# Users who want reliability: `pip install "getbased-rag[full]"` — the
# default LocalEmbedder (sentence-transformers / PyTorch CPU) just works
# with zero config. ~2-3x slower on CPU than ONNX but bulletproof.
onnx = [
    "onnxruntime>=1.17",
    # optimum 2.x removed ORTModelForFeatureExtraction (used by embedder.py).
    # Hold at 1.x until embedder is updated to the new API.
    "optimum[onnxruntime]>=1.17,<2.0",
    # optimum 1.x expects transformers <4.58. Our embedder doesn't touch
    # the Trainer class (CVE GHSA-pj3j-xmh8-xrqj is scoped to Trainer),
    # so staying on 4.x is safe — Dependabot flags are won't-fix here.
    "transformers>=4.36,<4.58",
]
full = ["pypdf>=3.9", "python-docx>=1.0"]
test = ["pytest>=8.0", "httpx>=0.27"]

[project.scripts]
lens = "lens.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
