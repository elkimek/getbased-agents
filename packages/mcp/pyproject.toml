[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "getbased-mcp"
version = "0.2.5"
description = "MCP server for querying blood work data and knowledge base from getbased"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
test = ["pytest>=8.0", "pytest-asyncio>=0.23", "respx>=0.21"]

[project.scripts]
getbased-mcp = "getbased_mcp:mcp.run"

# Single-file module — tell setuptools to pick it up as a flat module.
[tool.setuptools]
py-modules = ["getbased_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
asyncio_mode = "auto"
